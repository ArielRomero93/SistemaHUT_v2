{% extends 'base.html' %}

{% block title %}Eliminar Grupo — Sistema HUT{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="glass-card rounded-xl p-8 text-center border-red-500/20">
        <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-white mb-2">¿Eliminar Grupo?</h1>
        <p class="text-gray-400 mb-8">
            Estás a punto de eliminar el grupo <strong class="text-white">{{ object.nombre }}</strong>. Esta acción no se puede deshacer.
        </p>

        <form method="post" action="" class="flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'grupos_lista' %}" class="px-6 py-2.5 text-sm font-medium text-gray-300 rounded-lg border border-hut-300/20 hover:bg-hut-300/10 transition-colors">
                Cancelar
            </a>
            <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-red-500 rounded-lg hover:bg-red-600 shadow-lg shadow-red-500/20 transition-colors">
                Sí, Eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
