{% extends 'publico/base_publica.html' %}

{% block title %}¡Gracias! — Hasta lo Último de la Tierra{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-2xl p-8 sm:p-10 shadow-sm border border-gray-100 text-center">
        
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
            <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900 mb-3 tracking-tight">
            ¡Muchas Gracias!
        </h2>
        
        <p class="text-base text-gray-600 mb-8 leading-relaxed">
            Hemos recibido tus datos de voluntariado correctamente. Nuestro equipo se pondrá en contacto contigo pronto.
        </p>
    </div>
</div>
{% endblock %}
