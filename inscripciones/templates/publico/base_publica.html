{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inscripción HUT{% endblock %}</title>
    <meta name="description" content="Formulario de Inscripción — Hasta lo Último de la Tierra">
    <link rel="icon" type="image/png" href="{% static 'img/logoFronteras.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        hut: {
                            DEFAULT: '#81A9A4',
                            light: '#a3c4c0',
                            dark: '#5e8a85',
                            darker: '#3d6b67',
                        },
                        cream: {
                            DEFAULT: '#ECE8D9',
                            light: '#F5F3EA',
                            dark: '#DDD8C5',
                        },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        select option {
            background: white;
            color: #1a1a1a;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-cream-light min-h-screen text-gray-900">
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-12 py-6 bg-gray-900 text-center">
        <p class="text-xs text-gray-400">
            &copy; 2026 Fronteras — Hasta lo Último de la Tierra
        </p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
